<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>岳麓山抗战遗址导览 | 中南大学红色基因传承调研</title>
    
    <!-- SEO & Meta -->
    <meta name="description" content="中南大学计算机学院2511班红色基因传承社会实践团制作，带您深度调研岳麓山抗战遗址。">
    <meta name="theme-color" content="#003d33">

    <style>
        :root {
            --csu-green: #003d33;
            --csu-green-dark: #002620;
            --csu-gold: #b08d49;
            --csu-gold-light: #dfc18d;
            --text-light: rgba(255,255,255,0.9);
            --sidebar-w: 380px;
            --safe-transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            height: 100%; width: 100%; overflow: hidden;
            background-color: #050a09;
            color: #333;
        }

        /* --- 核心动画定义 --- */
        @keyframes kenburns { 
            0% { transform: scale(1.0) rotate(0deg); } 
            100% { transform: scale(1.1) rotate(0.5deg); } 
        }
        @keyframes dropIn { 
            from { transform: translateY(-80px); opacity: 0; filter: blur(15px); } 
            to { transform: translateY(0); opacity: 1; filter: blur(0); } 
        }
        @keyframes slideUp { 
            from { transform: translateY(50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 全屏转场控制 */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; opacity: 0; 
            transition: var(--safe-transition);
        }
        .screen.active { display: flex; opacity: 1; z-index: 10; }
        .screen.zoom-out { transform: scale(1.1); opacity: 0; filter: blur(20px); pointer-events: none; }

        /* --- 欢迎页面：庄严肃穆设计 --- */
        #welcome-screen {
            background: #000; color: white; justify-content: center; align-items: center; text-align: center;
        }

        .bg-layer {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
            background: url('https://images.unsplash.com/photo-1599708139500-11c217a6968c?auto=format&fit=crop&q=80&w=1600') center/cover;
            animation: kenburns 30s infinite alternate ease-in-out;
            z-index: 0;
        }
        .overlay-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,20,15,0.4) 0%, rgba(5,10,9,0.95) 80%);
            z-index: 1;
        }

        .welcome-card {
            position: relative; z-index: 2; padding: 70px 50px; border-radius: 2px;
            background: rgba(0, 30, 25, 0.4); border: 1px solid rgba(176,141,73,0.4);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            max-width: 600px; width: 90%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 50px rgba(176,141,73,0.05);
        }

        .csu-logo {
            width: 100px; height: 100px; margin: 0 auto 35px;
            background: #fff; border-radius: 50%; padding: 12px;
            box-shadow: 0 0 50px rgba(176, 141, 73, 0.4);
            animation: dropIn 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        h1 {
            font-size: 3.2em; margin: 0; font-weight: 900; letter-spacing: 12px;
            background: linear-gradient(180deg, #fff 30%, var(--csu-gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: fadeIn 2s ease-out 0.5s both;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .badge {
            display: inline-block; margin-top: 25px; padding: 10px 30px; 
            border: 1px solid var(--csu-gold); color: var(--csu-gold); font-size: 14px;
            font-weight: bold; border-radius: 0; letter-spacing: 6px;
            animation: fadeIn 1.5s ease-out 1s both;
            background: rgba(176,141,73,0.05);
        }

        .btn-explore {
            margin-top: 60px; padding: 22px 70px; border: none; 
            background: linear-gradient(90deg, var(--csu-gold), #d4af37, var(--csu-gold));
            background-size: 200% auto;
            color: #fff; font-size: 1.2em; font-weight: 800; cursor: pointer;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); transition: 0.5s;
            animation: slideUp 1.2s ease-out 1.5s both, borderFlow 3s infinite;
            letter-spacing: 4px;
        }
        .btn-explore:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 30px 50px rgba(0,0,0,0.6); filter: brightness(1.1); }

        /* --- 主界面设计 --- */
        #main-app { flex-direction: row; background: #f4f6f4; }
        
        #sidebar {
            width: var(--sidebar-w); height: 100%; background: #fff;
            display: flex; flex-direction: column; z-index: 100;
            box-shadow: 15px 0 50px rgba(0,0,0,0.1);
            border-right: 1px solid #d0d8d0;
        }

        .sidebar-brand {
            padding: 45px 30px; background: var(--csu-green); color: white;
            border-bottom: 5px solid var(--csu-gold);
            position: relative; overflow: hidden;
        }
        .sidebar-brand::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
        }

        .site-list { flex: 1; overflow-y: auto; padding: 25px; background: #fafafa; }
        .site-card {
            display: flex; gap: 18px; align-items: center; padding: 20px;
            background: #fff; border: 1px solid #e2e8e2; margin-bottom: 20px; 
            cursor: pointer; transition: var(--safe-transition);
            position: relative;
        }
        .site-card:hover { 
            border-color: var(--csu-gold); transform: translateY(-3px) translateX(5px);
            box-shadow: 0 15px 30px rgba(0,61,51,0.08);
        }
        .site-card.active { 
            border-left: 8px solid var(--csu-green); 
            background: #f0f7f4;
            border-color: var(--csu-green);
        }
        
        .card-thumb { width: 100px; height: 75px; object-fit: cover; filter: sepia(0.3) contrast(1.1); border-radius: 2px; }
        .card-info h4 { margin: 0 0 8px; color: var(--csu-green); font-size: 17px; font-weight: 800; letter-spacing: 0.5px; }
        .card-info p { margin: 0; font-size: 13px; color: #666; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }

        #map-container { flex: 1; position: relative; background: #eee; }
        
        /* 地图控件 */
        .map-controls {
            position: absolute; top: 30px; right: 30px; z-index: 500;
            display: flex; flex-direction: column; gap: 15px;
        }
        .map-type-switch {
            display: flex; background: rgba(0,61,51,0.95); backdrop-filter: blur(15px);
            border-radius: 4px; padding: 5px; border: 1px solid var(--csu-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .map-type-btn {
            padding: 12px 24px; font-size: 13px; cursor: pointer; border: none; background: none; color: white; opacity: 0.5; transition: 0.3s;
            font-weight: 600; letter-spacing: 1px;
        }
        .map-type-btn.active { opacity: 1; color: var(--csu-gold); }

        /* --- 详情弹窗 --- */
        #info-popup {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,10,8,0.88); backdrop-filter: blur(12px);
        }
        .popup-window {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 650px; background: white;
            border-radius: 12px 12px 0 0; overflow: hidden;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
            animation: popupSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes popupSlideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }

        .popup-header { height: 350px; position: relative; overflow: hidden; }
        .popup-header img { width: 100%; height: 100%; object-fit: cover; transition: 10s linear; }
        .popup-window:hover .popup-header img { transform: scale(1.1); }
        .popup-header::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 40%); 
        }
        .popup-close {
            position: absolute; top: 25px; right: 25px; width: 45px; height: 45px;
            background: rgba(0,0,0,0.7); color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.2);
        }
        .popup-close:hover { background: var(--csu-gold); transform: rotate(90deg); }

        .popup-content { padding: 45px; }
        .popup-content h2 { 
            margin: 0 0 25px; color: var(--csu-green); 
            border-left: 6px solid var(--csu-gold); padding-left: 20px; 
            font-size: 2em; font-weight: 900; letter-spacing: 1px;
        }
        .popup-content p { line-height: 2.2; color: #444; font-size: 17px; margin-bottom: 45px; text-align: justify; }

        .nav-actions { display: flex; flex-direction: column; gap: 15px; }
        .btn-nav { 
            width: 100%; padding: 22px; border: none; font-weight: 800; cursor: pointer; 
            transition: 0.4s; border-radius: 4px; display: flex; align-items: center; justify-content: center; gap: 10px;
            letter-spacing: 1.5px;
        }
        .btn-main { background: var(--csu-green); color: white; font-size: 1.15em; box-shadow: 0 10px 25px rgba(0,61,51,0.2); }
        .btn-main:hover { background: var(--csu-green-dark); transform: translateY(-2px); box-shadow: 0 15px 35px rgba(0,61,51,0.3); }
        
        .btn-sub-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-outline { background: #f8faf8; color: #333; border: 1px solid #ddd; font-size: 0.95em; }
        .btn-outline:hover { background: #eee; border-color: #bbb; }

        /* 响应式适配 */
        @media (max-width: 850px) {
            #main-app { flex-direction: column; }
            #sidebar { width: 100%; height: 45vh; order: 2; border-right: none; border-top: 1px solid #ddd; }
            #map-container { height: 55vh; order: 1; }
            h1 { font-size: 2.2em; letter-spacing: 6px; }
            .welcome-card { padding: 50px 30px; }
            .btn-explore { padding: 18px 50px; }
        }

        /* 导航状态栏优化 */
        .nav-status-toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,61,51,0.98); color: white; padding: 20px 40px;
            border-radius: 4px; z-index: 2000; font-size: 15px; font-weight: 600;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4); border: 1px solid var(--csu-gold);
            display: flex; align-items: center; gap: 15px;
            animation: slideDown 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=h2e6Ofrn9wP57hIx8yQwAMhzdueEFv0S"></script>
</head>
<body>

    <!-- 欢迎页面 -->
    <div id="welcome-screen" class="screen active">
        <div class="bg-layer"></div>
        <div class="overlay-layer"></div>
        <div class="welcome-card">
            <div class="csu-logo">
                <img src="https://www.csu.edu.cn/images/logo.png" alt="CSU Logo" style="width:100%">
            </div>
            <h1>岳麓山抗战遗址</h1>
            <div class="badge">铭记历史 · 传承红色基因</div>
            <p style="margin-top:30px; color:var(--csu-gold-light); font-weight:bold; letter-spacing:3px; font-size: 1.1em;">中南大学计算机学院 2511 班</p>
            <p style="opacity:0.7; font-size:13px; margin-top:8px; letter-spacing:1px">红色基因传承社会实践调研团制作</p>
            <button class="btn-explore" onclick="enterSystem()">开启数字档案</button>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-app" class="screen">
        <aside id="sidebar">
            <div class="sidebar-brand">
                <h3 style="margin:0; letter-spacing:3px; font-size: 1.4em;">历史调研清单</h3>
                <p style="margin:10px 0 0; opacity:0.8; font-size:12px; letter-spacing:1px">YUELU MOUNTAIN WAR SITES GUIDE</p>
            </div>
            <div id="site-list" class="site-list">
                <!-- JS动态注入 -->
            </div>
            <div style="padding:20px; border-top:1px solid #eee; text-align:center; background:#fff">
                <img src="https://www.csu.edu.cn/images/logo.png" style="height:26px; filter: grayscale(1) contrast(1.2) opacity(0.6);">
            </div>
        </aside>

        <main id="map-container">
            <div class="map-controls">
                <div class="map-type-switch">
                    <button class="map-type-btn active" onclick="setMapType('normal', this)">人文地图</button>
                    <button class="map-type-btn" onclick="setMapType('satellite', this)">实景卫星</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 详情弹窗 -->
    <div id="info-popup" onclick="if(event.target==this) closePopup()">
        <div class="popup-window">
            <div class="popup-header">
                <div class="popup-close" onclick="closePopup()">✕</div>
                <img id="popup-img" src="" alt="Site Image">
            </div>
            <div class="popup-content">
                <h2 id="popup-title"></h2>
                <p id="popup-text"></p>
                <div class="nav-actions">
                    <button class="btn-nav btn-main" onclick="navInternal()">
                        <span>🚩</span> 开启实时步行路径导航
                    </button>
                    <div class="btn-sub-row">
                        <button class="btn-nav btn-outline" onclick="navExternalBaidu()">百度地图跳转</button>
                        <button class="btn-nav btn-outline" onclick="navExternalGaode()">高德地图跳转</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sitesData = [
            {
                id: 1,
                name: "长沙抗战纪念馆（炮兵指挥所）",
                point: new BMap.Point(112.93600, 28.19900),
                img: "http://img1.voc.com.cn/UpLoadFile/2015/09/01/201509011528238902.jpg",
                desc: "位于云麓峰下，是第九战区岳麓山炮兵指挥所旧址。三次长沙会战期间，在此指挥的重炮群对日军造成了毁灭性打击，是保卫长沙的重要火力中枢。"
            },
            {
                id: 2,
                name: "陆军七十三军抗战阵亡将士公墓",
                point: new BMap.Point(112.92300, 28.19000),
                img: "https://www.krzzjn.com/uploadfile/2018/0531/20180531090429977.jpg",
                desc: "公墓与纪念塔合为一体，依山而建。安葬着在长沙会战中壮烈牺牲的七十三军将士。塔身巍峨，铭刻着“忠烈”军魂，是岳麓山最重要的抗战纪念遗址。"
            },
            {
                id: 3,
                name: "抗战阵亡将士名录石栏",
                point: new BMap.Point(112.93400, 28.19850),
                img: "http://y1.ifengimg.com/a/2015_31/99765a80ee8fcb8.jpg",
                desc: "云麓宫石栏上刻有五千多位将士的姓名。这些名字在风雨中矗立，每一个字都代表着一个不屈的灵魂，见证了抗战岁月的惨烈与尊严。"
            },
            {
                id: 4,
                name: "岳麓山古炮台遗址",
                point: new BMap.Point(112.93100, 28.20050),
                img: "https://www.krzzjn.com/uploadfile/2020/0615/20200615110810273.jpg",
                desc: "地理位置极其险要，是当时控制长沙城区及湘江航道的战略制高点。至今仍保留着清晰的阵地轮廓，诉说着当年的铁血防御。"
            },
            {
                id: 5,
                name: "第九战区司令部临时指挥部",
                point: new BMap.Point(112.93850, 28.19500),
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Changsha_Yuelu_Shan_Dijiu_Zhanqu_Silingbu_Zhihuisuo_Jiuzhi_2014.03.04_09-34-54.jpg/500px-Changsha_Yuelu_Shan_Dijiu_Zhanqu_Silingbu_Zhihuisuo_Jiuzhi_2014.03.04_09-34-54.jpg",
                desc: "薛岳将军曾在此防空洞内坐镇指挥，运用著名的“天炉战法”重创日军。该旧址保存完好，是抗战指挥体系的重要实物见证。"
            },
            {
                id: 6,
                name: "长沙会战纪念碑",
                point: new BMap.Point(112.93180, 28.20050),
                img: "https://dimg04.c-ctrip.com/images/10090s000000ibgj5E8F1_W_750_0.jpg?proc=autoorient",
                desc: "高耸的纪念碑镌刻着会战纪要，不仅是军事胜利的见证，更是中华民族在生死存亡关头展现出的不屈精神象征。"
            },
            {
                id: 7,
                name: "麓山忠烈祠",
                point: new BMap.Point(112.92350, 28.18940),
                img: "https://www.krzzjn.com/uploadfile/2020/0616/20200616101231903.jpg",
                desc: "仿古建筑风格，庄严肃穆。此处专为祭祀抗日阵亡将士而设，现作为爱国主义教育基地，陈列着大量珍贵的抗战影像与文物。"
            }
        ];

        let map, currentSite;

        function enterSystem() {
            const welcome = document.getElementById('welcome-screen');
            const app = document.getElementById('main-app');
            welcome.classList.add('zoom-out');
            setTimeout(() => {
                welcome.classList.remove('active');
                app.style.display = 'flex';
                setTimeout(() => {
                    app.classList.add('active');
                    initMap();
                }, 50);
            }, 800);
        }

        function initMap() {
            map = new BMap.Map("map-container", { enableMapClick: false });
            map.centerAndZoom(new BMap.Point(112.93200, 28.19500), 16);
            map.enableScrollWheelZoom(true);
            
            // 使用更深沉的自定义地图样式
            map.setMapStyleV2({ styleId: '49265f242e850b5220c3260ef16279f0' });

            const listContainer = document.getElementById('site-list');
            listContainer.innerHTML = "";

            sitesData.forEach((site, index) => {
                const marker = new BMap.Marker(site.point);
                map.addOverlay(marker);
                marker.addEventListener('click', () => openPopup(site));

                const card = document.createElement('div');
                card.className = 'site-card';
                card.id = `site-${site.id}`;
                card.style.animation = `slideUp 0.8s ease-out ${index * 0.1}s both`;
                card.innerHTML = `
                    <img src="${site.img}" class="card-thumb" onerror="this.src='https://via.placeholder.com/100?text=遗址'">
                    <div class="card-info">
                        <h4>${site.name}</h4>
                        <p><span>🏛️</span> 点击查看调研详情</p>
                    </div>
                `;
                card.onclick = () => focusSite(site);
                listContainer.appendChild(card);
            });
        }

        function focusSite(site) {
            map.panTo(site.point, { noAnimation: false });
            setTimeout(() => map.setZoom(18), 300);
            openPopup(site);
            document.querySelectorAll('.site-card').forEach(c => c.classList.remove('active'));
            const card = document.getElementById(`site-${site.id}`);
            card.classList.add('active');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function setMapType(type, btn) {
            document.querySelectorAll('.map-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            map.setMapType(type === 'satellite' ? BMAP_SATELLITE_MAP : BMAP_NORMAL_MAP);
        }

        function openPopup(site) {
            currentSite = site;
            document.getElementById('popup-title').innerText = site.name;
            document.getElementById('popup-text').innerText = site.desc;
            document.getElementById('popup-img').src = site.img;
            document.getElementById('info-popup').style.display = 'block';
        }

        function closePopup() { document.getElementById('info-popup').style.display = 'none'; }

        // 优化后的内部导航逻辑
        function navInternal() {
            if (!currentSite) return;
            const toast = showNavStatus("🛰️ 正在尝试获取您的实时位置并校准路径...");
            
            navigator.geolocation.getCurrentPosition(pos => {
                const gpsPoint = new BMap.Point(pos.coords.longitude, pos.coords.latitude);
                // 坐标转换（GPS到百度加密坐标）
                new BMap.Convertor().translate([gpsPoint], 1, 5, (data) => {
                    if(data.status === 0) {
                        toast.innerHTML = "✅ 定位成功，正在为您生成最佳步行调研路径...";
                        setTimeout(() => {
                            removeNavStatus(toast);
                            closePopup();
                            map.clearOverlays();
                            initMap(); 
                            const walking = new BMap.WalkingRoute(map, { 
                                renderOptions: { map: map, autoViewport: true },
                                onSearchComplete: function(results){
                                    if (walking.getStatus() != BMAP_STATUS_SUCCESS){
                                        showNavStatus("❌ 路径规划失败，请尝试其他地图跳转", 3000);
                                    }
                                }
                            });
                            walking.search(data.points[0], currentSite.point);
                        }, 1000);
                    } else {
                        toast.innerHTML = "❌ 坐标校准失败";
                        setTimeout(() => removeNavStatus(toast), 2000);
                    }
                });
            }, err => {
                removeNavStatus(toast);
                const errorMsg = err.code === 1 ? "用户拒绝了位置授权" : "GPS 信号弱，无法定位";
                showNavStatus(`⚠️ 定位失败: ${errorMsg}。建议使用跳转导航。`, 4000);
            }, { timeout: 8000, enableHighAccuracy: true });
        }

        function navExternalBaidu() {
            window.open(`https://api.map.baidu.com/marker?location=${currentSite.point.lat},${currentSite.point.lng}&title=${encodeURIComponent(currentSite.name)}&content=${encodeURIComponent(currentSite.desc)}&output=html`);
        }

        function navExternalGaode() {
            // 火星坐标转换简易逻辑
            const x_pi = 3.14159265358979324 * 3000.0 / 180.0;
            const x = currentSite.point.lng - 0.0065, y = currentSite.point.lat - 0.006;
            const z = Math.sqrt(x * x + y * y) - 0.00002 * Math.sin(y * x_pi);
            const theta = Math.atan2(y, x) - 0.000003 * Math.cos(x * x_pi);
            window.open(`https://uri.amap.com/marker?position=${z * Math.cos(theta)},${z * Math.sin(theta)}&name=${encodeURIComponent(currentSite.name)}&coordinate=gcj02&callnative=1`);
        }

        function showNavStatus(msg, duration = 0) {
            const div = document.createElement('div');
            div.className = 'nav-status-toast';
            div.innerHTML = `<span>⏳</span> ${msg}`;
            document.body.appendChild(div);
            if(duration > 0) setTimeout(() => removeNavStatus(div), duration);
            return div;
        }
        function removeNavStatus(el) { 
            if(el && el.parentNode) {
                el.style.opacity = '0';
                el.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => el.parentNode.removeChild(el), 500);
            }
        }
    </script>
</body>
</html>
